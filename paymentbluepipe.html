<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<title>Pemesanan</title>

	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Poppins', sans-serif;
		}

		body {
			background: #5E3849;
			padding: 40px;
			color: white;
		}

		.container {
			background: white;
			color: black;
			padding: 30px;
			border-radius: 20px;
			max-width: 900px;
			margin: auto;
		}

		h2 {
			margin-bottom: 20px;
			color: #5E3849;
		}

		.form-group {
			margin-bottom: 15px;
		}

		input, textarea {
			width: 100%;
			padding: 10px;
			border-radius: 10px;
			border: 1px solid #ccc;
		}

		.order-box {
			display: flex;
			gap: 20px;
			margin: 20px 0;
			background: #f9f9f9;
			padding: 15px;
			border-radius: 15px;
		}

		.order-box img {
			width: 120px;
			border-radius: 10px;
		}

		.payment-method {
			margin-top: 20px;
		}

		.payment-method h3 {
			margin-bottom: 10px;
		}

		label {
			display: block;
			margin-bottom: 8px;
		}

		btn-pay {
			display: inline-block;
			margin-top: 20px;
			padding: 12px 25px;
			border-radius: 20px;
			background: #5E3849;
			color: white;
			text-decoration: none;
		}

		.btn-pay:hover {
			background: #ff4da6;
		}
	</style>
</head>

<body>

<div class="container">

    <h2>Data Pemesan</h2>

    <div class="form-group">
        <input type="text" id="nama" placeholder="Nama Penerima" required>
    </div>

    <div class="form-group">
        <input type="text" id="email" placeholder="Email" required>
    </div>

    <div class="form-group">
        <input type="text" id="telp" placeholder="No Telepon" required>
    </div>

    <div class="form-group">
        <textarea id="alamat" placeholder="Alamat Lengkap" required></textarea>
    </div>

    <!-- PESANAN -->
    <h2>Pesanan Anda</h2>

    <div class="order-box">
        <img src="bluepipe.jpeg">
        <div>
            <p><b>Blue Theme Pipe</b></p>
            <p>Jumlah: <span id="jumlah"></span></p>
			<p>Total: Rp <span id="total"></span></p>
        </div>
    </div>

    <!-- PAYMENT -->
    <div class="payment-method">
        <h2>Metode Pembayaran</h2>

        <h3>Virtual Bank</h3>
        <label><input type="radio" name="payment" value="Mandiri"> Mandiri</label>
        <label><input type="radio" name="payment" value="BNI"> BNI</label>
        <label><input type="radio" name="payment" value="BRI"> BRI</label>

        <h3>E-Wallet</h3>
        <label><input type="radio" name="payment" value="GoPay"> GoPay</label>
        <label><input type="radio" name="payment" value="Dana"> Dana</label>
    </div>

    <button class="btn-pay" onclick="checkout()">Pay Now</button>

</div>

<script>
function checkout() {
    const nama = document.getElementById("nama").value;
    const email = document.getElementById("email").value;
    const telp = document.getElementById("telp").value;
    const alamat = document.getElementById("alamat").value;

    const payment = document.querySelector('input[name="payment"]:checked');

    if (!nama || !email || !telp || !alamat || !payment) {
        alert("Harap isi semua data!");
        return;
    }

    localStorage.setItem("nama", nama);
    localStorage.setItem("email", email);
    localStorage.setItem("telp", telp);
    localStorage.setItem("alamat", alamat);
    localStorage.setItem("payment", payment.value);

    localStorage.setItem("produk", "Blue Theme Pipe");
    localStorage.setItem("harga", 200000);

    window.location.href = "receipt.html";
}

	const jumlah = Number(localStorage.getItem("jumlah")) || 1;
	const harga = Number(localStorage.getItem("harga")) || 0;

	const total = jumlah * harga;

	document.getElementById("jumlah").innerText = jumlah;
	document.getElementById("total").innerText = total;
	
</script>

</body>
</html>
