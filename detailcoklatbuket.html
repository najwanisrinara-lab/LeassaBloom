<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<title>Detail Produk</title>

	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Poppins', sans-serif;
		}

		body {
			background: #5E3849;
			color: white;
			padding: 40px;
		}

		.container {
			display: flex;
			flex-wrap: wrap;
			gap: 40px;
			background: white;
			color: black;
			padding: 30px;
			border-radius: 20px;
		}

		.container img {
			width: 300px;
			border-radius: 15px;
		}

		.details {
			max-width: 400px;
		}

		.details h2 {
			margin-bottom: 10px;
		}

		.price {
			color: #5E3849;
			font-size: 20px;
			margin-bottom: 15px;
		}

		.info {
			margin-bottom: 10px;
		}

		input {
			padding: 8px;
			width: 80px;
			margin-top: 10px;
		}

		textarea {
			width: 100%;
			margin-top: 10px;
			padding: 10px;
			border-radius: 10px;
		}

		.btn-buy {
			display: inline-block;
			margin-top: 20px;
			padding: 12px 25px;
			border-radius: 20px;
			background: #5E3849;
			color: white;
			text-decoration: none;
		}

	</style>
</head>

<body>

<div class="container">
    <img src="coklatbuket.jpg">

    <div class="details">
        <h2>Coklat Theme</h2>
        <p class="price">Rp 280.000</p>

        <p class="info"><b>Jenis:</b> Bunga Palsu</p>
        <p class="info"><b>Occasion:</b> Graduation, Anniversary, Wedding, Birthday</p>
        <p class="info"><b>Tema:</b> Elegant Coklat </p>

        <label>Jumlah:</label><br>
        <input type="number" id="qty" value="1" min="1">

        <br><br>

        <label>Catatan:</label>
        <textarea placeholder="Tulis pesan atau request khusus..."></textarea>

        <br>

        <button class="btn-buy" onclick="beli()">Buy Now</button>
    </div>
</div>

<script>
function beli() {
    const jumlah = Number(document.getElementById("qty").value) || 1;

    console.log("Jumlah dikirim:", jumlah); 

    localStorage.setItem("jumlah", jumlah);
    localStorage.setItem("harga", 280000);
    localStorage.setItem("produk", "Coklat Theme");

    window.location.href = "paymentcoklatbuket.html";
}
</script>

</body>
</html>
